name: 24/7 Content Bot
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # ወደ v4 ተቀይሯል
      
      - name: Set up Python
        uses: actions/setup-python@v5 # ወደ v5 ተቀይሯል
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp telethon deep-translator
          
      - name: Run bot
        run: python main.py
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
